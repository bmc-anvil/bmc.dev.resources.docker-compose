services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:cuda # open-webui only with support for cuda
    container_name: open-webui
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    network_mode: host
    environment:
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      WEBUI_AUTH: False
      PORT: 3001
    volumes:
      - open-webui:/app/backend/data
    restart: always

volumes:
  open-webui:

